name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            binary: gitriot
            archive: gitriot-linux-amd64.zip
          - name: windows-amd64
            goos: windows
            goarch: amd64
            binary: gitriot.exe
            archive: gitriot-windows-amd64.zip
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            binary: gitriot
            archive: gitriot-darwin-amd64.zip
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            binary: gitriot
            archive: gitriot-darwin-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags "-X main.version=${{ github.ref_name }}" -o "dist/${{ matrix.name }}/${{ matrix.binary }}" ./cmd/gitriot

      - name: Package binary
        run: cd "dist/${{ matrix.name }}" && zip "../${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*.zip
